<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snakes Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #fff;
    overflow: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,255,128,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,200,255,0.04) 0%, transparent 50%);
  }

  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 12px;
    width: 100%;
    max-width: 520px;
  }

  #title {
    font-size: clamp(10px, 3vw, 16px);
    letter-spacing: 4px;
    color: #00ff80;
    text-shadow: 0 0 10px rgba(0,255,128,0.8), 0 0 30px rgba(0,255,128,0.3);
  }

  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 400px;
  }

  #score-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(7px, 2.2vw, 11px);
    color: #aaa;
  }

  #score-val {
    color: #00ff80;
    text-shadow: 0 0 8px rgba(0,255,128,0.6);
    min-width: 36px;
    text-align: right;
  }

  #speed-indicator {
    font-size: clamp(6px, 1.8vw, 9px);
    color: #557755;
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  #speed-indicator.boosted {
    color: #ffcc00;
    text-shadow: 0 0 8px rgba(255,204,0,0.7);
  }

  #canvas-container {
    position: relative;
    border: 2px solid #1a2a1a;
    box-shadow:
      0 0 0 1px #00ff8022,
      0 0 20px rgba(0,255,128,0.1),
      0 0 60px rgba(0,255,128,0.05),
      inset 0 0 40px rgba(0,0,0,0.5);
    border-radius: 4px;
    overflow: hidden;
  }

  canvas { display: block; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,10,5,0.85);
    gap: 20px;
    backdrop-filter: blur(2px);
  }

  #overlay-title {
    font-size: clamp(10px, 3vw, 14px);
    color: #00ff80;
    text-shadow: 0 0 12px rgba(0,255,128,0.9);
    letter-spacing: 3px;
    text-align: center;
    line-height: 2;
  }

  #overlay-sub {
    font-size: clamp(7px, 2vw, 9px);
    color: #557755;
    letter-spacing: 2px;
    text-align: center;
    line-height: 2.5;
    animation: blink 1.2s step-end infinite;
  }

  #overlay-paused {
    display: none;
    font-size: clamp(7px, 2vw, 9px);
    color: #ffcc00;
    text-shadow: 0 0 8px rgba(255,204,0,0.6);
    letter-spacing: 2px;
    text-align: center;
    line-height: 2.5;
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #restart-btn {
    display: none;
    padding: 10px 24px;
    background: transparent;
    border: 2px solid #00ff80;
    color: #00ff80;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(7px, 2vw, 9px);
    cursor: pointer;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(0,255,128,0.6);
    box-shadow: 0 0 12px rgba(0,255,128,0.2);
    transition: all 0.15s;
    border-radius: 2px;
    -webkit-tap-highlight-color: transparent;
  }

  #restart-btn:hover, #restart-btn:active {
    background: rgba(0,255,128,0.15);
    box-shadow: 0 0 20px rgba(0,255,128,0.4);
  }

  #dpad {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 4px;
  }

  .dpad-btn {
    background: rgba(0,255,128,0.08);
    border: 1.5px solid rgba(0,255,128,0.3);
    border-radius: 6px;
    color: #00ff80;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, box-shadow 0.1s, border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
  }

  .dpad-btn.boosting {
    background: rgba(255,204,0,0.18);
    border-color: rgba(255,204,0,0.7);
    color: #ffcc00;
    box-shadow: 0 0 14px rgba(255,204,0,0.35);
  }

  .dpad-btn:active {
    background: rgba(0,255,128,0.22);
    box-shadow: 0 0 12px rgba(0,255,128,0.3);
  }

  .hold-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px; width: 0%;
    background: #ffcc00;
    box-shadow: 0 0 6px rgba(255,204,0,0.8);
    border-radius: 0 0 4px 4px;
  }

  .dpad-empty {
    background: transparent;
    border: none;
    pointer-events: none;
  }

  #pause-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(0,255,128,0.35);
    color: #00ff80;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  #pause-btn:hover, #pause-btn:active {
    background: rgba(0,255,128,0.15);
    border-color: rgba(0,255,128,0.8);
    box-shadow: 0 0 12px rgba(0,255,128,0.3);
  }

  #pause-btn:disabled {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
  }

  /* Down button hidden until game starts */
  #btn-down {
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  #btn-down.visible {
    opacity: 1;
  }
  #btn-down:disabled {
    opacity: 0 !important;
  }

  @media (min-width: 600px) and (min-height: 700px) {
    #dpad { display: none; }
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="title">Snakes Game</div>

  <div id="top-bar">
    <div id="score-bar">SCORE: <span id="score-val">0</span></div>
    <div id="speed-indicator">SPEED: NORMAL</div>
  </div>

  <div id="canvas-container">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div id="overlay-title">SNAKES<br>GAME</div>
      <div id="overlay-sub">PRESS ANY KEY<br>OR BUTTON TO START</div>
      <div id="overlay-paused">PAUSED<br>PRESS RESUME</div>
      <button id="restart-btn">PLAY AGAIN</button>
    </div>
  </div>

  <div id="dpad">
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-up">▲<div class="hold-bar"></div></button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-left">◀<div class="hold-bar"></div></button>
    <button id="pause-btn" disabled>⏸</button>
    <button class="dpad-btn" id="btn-right">▶<div class="hold-bar"></div></button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-down" disabled>▼<div class="hold-bar"></div></button>
    <div class="dpad-empty"></div>
  </div>
</div>

<script>
(function () {
  const CELL = 20;
  const COLS = 20;
  const ROWS = 20;
  const BASE_INTERVAL  = 243;
  const BOOST_INTERVAL = 180;
  const LONG_PRESS_MS  = 350;

  const canvas        = document.getElementById('canvas');
  const ctx           = canvas.getContext('2d');
  const overlay       = document.getElementById('overlay');
  const overlaySub    = document.getElementById('overlay-sub');
  const overlayPaused = document.getElementById('overlay-paused');
  const overlayTitle  = document.getElementById('overlay-title');
  const restartBtn    = document.getElementById('restart-btn');
  const scoreEl       = document.getElementById('score-val');
  const pauseBtn      = document.getElementById('pause-btn');
  const speedIndicator= document.getElementById('speed-indicator');
  const btnDown       = document.getElementById('btn-down');

  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;

  const HEAD_NORMAL    = '#00ff80';
  const BODY_NORMAL    = '#00cc66';
  const OUTLINE_NORMAL = '#004422';
  const HEAD_BOOST     = '#ffdd44';
  const BODY_BOOST     = '#ccaa00';
  const OUTLINE_BOOST  = '#554400';
  const FOOD_COLOR     = '#ff4466';
  const FOOD_GLOW      = 'rgba(255,68,102,0.6)';
  const BG_COLOR       = '#080d08';
  const GRID_COLOR     = 'rgba(0,255,128,0.03)';

  // gameState: 'idle' | 'running' | 'paused' | 'over'
  let snake, dir, nextDir, food, score, gameState, loopTimer;
  let isBoosting = false;

  const holdMap    = {};
  const keyHoldMap = {};

  // ── Init ──────────────────────────────────────────────────────────────────

  function initGame() {
    // Snake starts vertical: head top, body below — LEFT/RIGHT/UP all safe on first press
    snake   = [{ x: 10, y: 10 }, { x: 10, y: 11 }, { x: 10, y: 12 }];
    dir     = { x: 0, y: 0 };
    nextDir = { x: 0, y: 0 };
    score   = 0;
    scoreEl.textContent = '0';
    gameState  = 'idle';
    isBoosting = false;
    updateSpeedUI(false);
    pauseBtn.disabled = true;
    pauseBtn.textContent = '⏸';
    // Hide down button until game starts
    btnDown.disabled = true;
    btnDown.classList.remove('visible');
    spawnFood();
    clearInterval(loopTimer);
    draw();
  }

  function spawnFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  // ── Game flow ─────────────────────────────────────────────────────────────

  function startMoving() {
    if (gameState !== 'idle') return;
    gameState = 'running';
    overlay.style.display = 'none';
    pauseBtn.disabled = false;
    // Reveal and enable the down button now that the game has started
    btnDown.disabled = false;
    btnDown.classList.add('visible');
    restartLoop();
  }

  function restartLoop() {
    clearInterval(loopTimer);
    if (gameState === 'running') {
      loopTimer = setInterval(step, isBoosting ? BOOST_INTERVAL : BASE_INTERVAL);
    }
  }

  function togglePause() {
    if (gameState === 'running') {
      gameState = 'paused';
      clearInterval(loopTimer);
      cancelAllHolds();
      setBoost(false);
      pauseBtn.textContent = '▶';
      overlayTitle.textContent = 'PAUSED';
      overlaySub.style.display = 'none';
      overlayPaused.style.display = 'block';
      restartBtn.style.display = 'none';
      overlay.style.display = 'flex';
    } else if (gameState === 'paused') {
      gameState = 'running';
      overlay.style.display = 'none';
      overlayPaused.style.display = 'none';
      pauseBtn.textContent = '⏸';
      restartLoop();
    }
  }

  // ── Step ──────────────────────────────────────────────────────────────────

  function step() {
    // Apply buffered direction
    dir = { x: nextDir.x, y: nextDir.y };
    if (dir.x === 0 && dir.y === 0) return;

    const head    = snake[0];
    const newHead = { x: head.x + dir.x, y: head.y + dir.y };

    // Wall collision
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
      endGame(); return;
    }

    // Self collision
    // If eating: tail stays, check full body
    // If not eating: tail moves away, exclude it from check
    const willEat      = newHead.x === food.x && newHead.y === food.y;
    const checkAgainst = willEat ? snake : snake.slice(0, -1);
    if (checkAgainst.some(s => s.x === newHead.x && s.y === newHead.y)) {
      endGame(); return;
    }

    // Move
    snake.unshift(newHead);
    if (willEat) {
      score++;
      scoreEl.textContent = score;
      spawnFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function endGame() {
    clearInterval(loopTimer);
    gameState = 'over';
    cancelAllHolds();
    isBoosting = false;
    updateSpeedUI(false);
    pauseBtn.disabled = true;
    overlayTitle.textContent = 'GAME OVER';
    overlaySub.style.display = 'none';
    overlayPaused.style.display = 'none';
    restartBtn.style.display = 'inline-block';
    overlay.style.display = 'flex';
    draw();
    ctx.fillStyle = 'rgba(255,50,50,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ── Speed boost ───────────────────────────────────────────────────────────

  function setBoost(on) {
    if (isBoosting === on) return;
    isBoosting = on;
    updateSpeedUI(on);
    if (gameState === 'running') restartLoop();
    if (gameState === 'running' || gameState === 'idle') draw();
  }

  function updateSpeedUI(boosted) {
    speedIndicator.textContent = boosted ? 'SPEED: FAST' : 'SPEED: NORMAL';
    speedIndicator.classList.toggle('boosted', boosted);
  }

  function anyHoldActive() {
    return Object.keys(holdMap).length > 0 || Object.keys(keyHoldMap).length > 0;
  }

  // ── Drawing ───────────────────────────────────────────────────────────────

  function draw() {
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = GRID_COLOR;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // Food
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    ctx.save();
    ctx.shadowColor = FOOD_GLOW;
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = FOOD_COLOR;
    ctx.beginPath();
    ctx.arc(fx, fy, CELL / 2 - 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Snake (draw tail-to-head so head is on top)
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg  = snake[i];
      const x    = seg.x * CELL;
      const y    = seg.y * CELL;
      const pad  = 1, r = 4, size = CELL - pad * 2;

      if (i === 0) {
        // Head
        ctx.save();
        ctx.shadowColor = isBoosting ? 'rgba(255,204,0,0.6)' : 'rgba(0,255,128,0.5)';
        ctx.shadowBlur  = 8;
        ctx.fillStyle   = isBoosting ? HEAD_BOOST : HEAD_NORMAL;
        roundRect(ctx, x + pad, y + pad, size, size, r);
        ctx.fill();
        ctx.restore();
        // Eyes face movement direction
        const e = 3;
        ctx.fillStyle = '#001a0a';
        if (dir.x === 1 || (dir.x === 0 && dir.y === 0)) {
          ctx.fillRect(x + CELL - 6, y + 4,        e, e);
          ctx.fillRect(x + CELL - 6, y + CELL - 7, e, e);
        } else if (dir.x === -1) {
          ctx.fillRect(x + 3, y + 4,        e, e);
          ctx.fillRect(x + 3, y + CELL - 7, e, e);
        } else if (dir.y === -1) {
          ctx.fillRect(x + 4,        y + 3, e, e);
          ctx.fillRect(x + CELL - 7, y + 3, e, e);
        } else {
          ctx.fillRect(x + 4,        y + CELL - 6, e, e);
          ctx.fillRect(x + CELL - 7, y + CELL - 6, e, e);
        }
      } else {
        // Body
        ctx.fillStyle   = isBoosting ? BODY_BOOST   : BODY_NORMAL;
        ctx.strokeStyle = isBoosting ? OUTLINE_BOOST : OUTLINE_NORMAL;
        ctx.lineWidth   = 1;
        roundRect(ctx, x + pad, y + pad, size, size, r);
        ctx.fill();
        ctx.stroke();
      }
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h,     x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y,         x + r, y);
    ctx.closePath();
  }

  // ── Direction ─────────────────────────────────────────────────────────────

  function setDirection(dx, dy) {
    // Block DOWN while idle — body is directly below head
    if (gameState === 'idle' && dx === 0 && dy === 1) return;
    // Block 180-degree reversal while moving
    if ((dir.x !== 0 || dir.y !== 0) && dx === -dir.x && dy === -dir.y) return;

    nextDir = { x: dx, y: dy };

    if (gameState === 'idle') {
      // Set dir immediately so snake faces the right way from tick 1
      dir = { x: dx, y: dy };
      startMoving();
    }
  }

  // ── Keyboard ──────────────────────────────────────────────────────────────

  document.addEventListener('keydown', function (e) {
    if (e.repeat) return;
    switch (e.key) {
      case 'ArrowUp':    e.preventDefault(); setDirection(0, -1); startKeyHold(e.key); break;
      case 'ArrowDown':  e.preventDefault(); setDirection(0,  1); startKeyHold(e.key); break;
      case 'ArrowLeft':  e.preventDefault(); setDirection(-1, 0); startKeyHold(e.key); break;
      case 'ArrowRight': e.preventDefault(); setDirection(1,  0); startKeyHold(e.key); break;
      case ' ':          e.preventDefault();
        if (gameState === 'running' || gameState === 'paused') togglePause();
        break;
    }
  });

  document.addEventListener('keyup', function (e) {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      stopKeyHold(e.key);
    }
  });

  function startKeyHold(key) {
    if (keyHoldMap[key]) return;
    keyHoldMap[key] = setTimeout(function () { setBoost(true); }, LONG_PRESS_MS);
  }

  function stopKeyHold(key) {
    clearTimeout(keyHoldMap[key]);
    delete keyHoldMap[key];
    if (!anyHoldActive()) setBoost(false);
  }

  // ── D-pad long press ──────────────────────────────────────────────────────

  function cancelAllHolds() {
    ['btn-up','btn-down','btn-left','btn-right'].forEach(function(id) { releaseHold(id); });
    Object.keys(keyHoldMap).forEach(function(key) { stopKeyHold(key); });
  }

  function startHold(id) {
    if (holdMap[id]) return;
    const btn       = document.getElementById(id);
    const barEl     = btn ? btn.querySelector('.hold-bar') : null;
    const startTime = performance.now();

    function animBar(now) {
      if (!holdMap[id]) return;
      const pct = Math.min(100, ((now - startTime) / LONG_PRESS_MS) * 100);
      if (barEl) barEl.style.width = pct + '%';
      if (pct < 100) holdMap[id].rafId = requestAnimationFrame(animBar);
    }

    const timer = setTimeout(function () {
      if (btn) btn.classList.add('boosting');
      setBoost(true);
    }, LONG_PRESS_MS);

    holdMap[id] = { timer, rafId: requestAnimationFrame(animBar), barEl };
  }

  function releaseHold(id) {
    const s = holdMap[id];
    if (!s) return;
    clearTimeout(s.timer);
    cancelAnimationFrame(s.rafId);
    if (s.barEl) s.barEl.style.width = '0%';
    const btn = document.getElementById(id);
    if (btn) btn.classList.remove('boosting');
    delete holdMap[id];
    if (!anyHoldActive()) setBoost(false);
  }

  function bindDpadBtn(id, dx, dy) {
    const btn = document.getElementById(id);
    if (!btn) return;
    function onPress(e)   { e.preventDefault(); setDirection(dx, dy); startHold(id); }
    function onRelease(e) { e.preventDefault(); releaseHold(id); }
    btn.addEventListener('touchstart',  onPress,   { passive: false });
    btn.addEventListener('touchend',    onRelease, { passive: false });
    btn.addEventListener('touchcancel', onRelease, { passive: false });
    btn.addEventListener('mousedown',   onPress);
    btn.addEventListener('mouseup',     onRelease);
    btn.addEventListener('mouseleave',  onRelease);
  }

  bindDpadBtn('btn-up',    0, -1);
  bindDpadBtn('btn-down',  0,  1);
  bindDpadBtn('btn-left', -1,  0);
  bindDpadBtn('btn-right', 1,  0);

  // ── Pause button ──────────────────────────────────────────────────────────

  pauseBtn.addEventListener('click', togglePause);
  pauseBtn.addEventListener('touchstart', function (e) {
    e.preventDefault(); togglePause();
  }, { passive: false });

  // ── Restart ───────────────────────────────────────────────────────────────

  function doRestart() {
    restartBtn.style.display = 'none';
    overlaySub.style.display = 'block';
    overlayTitle.innerHTML = 'SNAKES<br>GAME';
    initGame();
  }

  restartBtn.addEventListener('click', doRestart);
  restartBtn.addEventListener('touchstart', function (e) {
    e.preventDefault(); doRestart();
  }, { passive: false });

  // ── Start ─────────────────────────────────────────────────────────────────

  initGame();
})();
</script>
</body>
</html>
